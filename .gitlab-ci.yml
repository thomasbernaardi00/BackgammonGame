stages:
  - lint
  - test
  - sonarqube-check
  - build
  - deploy

# LINTING: ESLint per verificare il codice
lint:
  stage: lint
  image: node:18
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - npm install
    - npm run lint
  allow_failure: true
  only:
    - merge_requests
    - master
    - main
    - develop

# TEST: Genera il report di coverage prima di SonarQube
test:
  stage: test
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - cd BackgammonGame # Modifica questa riga se la cartella è diversa
    - npm install
    - npx jest --coverage --coverageReporters=lcov
  allow_failure: true
  artifacts:
    paths:
      - coverage/
  only:
    - merge_requests
    - master
    - main
    - develop

# SONARQUBE: Analisi statica del codice e code coverage
sonarqube-check:
  stage: sonarqube-check
  image: sonarsource/sonar-scanner-cli:latest
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
    SONAR_CE_TASK_TIMEOUT: "15m"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - ls -lh BackgammonGame/coverage/
    - sonar-scanner -Dsonar.projectKey="Backgammon-gruppo11" -Dsonar.sources="BackgammonGame/src" -Dsonar.tests="BackgammonGame/src/test" -Dsonar.host.url="${SONAR_HOST_URL}" -Dsonar.token="${SONAR_TOKEN}"  -Dsonar.javascript.lcov.reportPaths="BackgammonGame/coverage/lcov.info" -Dsonar.ce.tasktimeout="${SONAR_CE_TASK_TIMEOUT}" -X
  allow_failure: true
  only:
    - merge_requests
    - master
    - main
    - develop

# BUILD: Creazione dell'immagine Docker
build:
  stage: build
  image: docker:latest
  services:
    - docker:20.10.7-dind
  variables:
    DOCKER_HOST: "unix:///var/run/docker.sock"
  before_script:
    - docker info
  script:
    - echo "Building Docker image..."
    - docker build -t backgammon-app:latest -f Dockerfile .
    - echo "Build completata!"
  only:
    - main

# DEPLOY: Avvio del container Docker
deploy:
  stage: deploy
  image: docker:20.10.7
  services:
    - docker:20.10.7-dind
  variables:
    DOCKER_HOST: "unix:///var/run/docker.sock"
  before_script:
    - docker info
  script:
    - echo "Eliminando il vecchio container (se esiste)..."
    - docker rm -f backgammon || true
    - echo "Creando e avviando il nuovo container Docker..."
    - docker run -d -p 3000:3000 --name backgammon backgammon-app
    - echo "DB_USERNAME=${DB_USERNAME}"
    - echo "JWT_SECRET=${JWT_SECRET}"
    - echo "VITE_API_KEY=${VITE_API_KEY}"
    - echo "Deploy completato!"
  only:
    - main
